<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sight Pond - 系统状态</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌊 Sight Pond</h1>
            <p>System Status Dashboard</p>
        </header>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('overview')">📊 总览</button>
            <button class="tab-btn" onclick="switchTab('agents')">🤖 子代理</button>
            <button class="tab-btn" onclick="switchTab('models')">🧠 模型</button>
            <button class="tab-btn" onclick="switchTab('domains')">🌐 域名配置</button>
            <button class="tab-btn" onclick="switchTab('ssl')">🔒 SSL 证书</button>
            <button class="tab-btn" onclick="switchTab('gallery')">🖼️ 图片集</button>
        </div>
        
        <!-- 总览标签页 -->
        <div id="overview" class="tab-content active">
            <div class="card">
                <h2>💚 服务健康摘要</h2>
                <div class="status-grid" id="health-summary">
                    <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
                </div>
            </div>
            <div class="card">
                <h2>✅ 服务健康状态</h2>
                <div class="status-grid" id="service-health">
                    <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
                </div>
            </div>
            <div class="card">
                <h2>🖥️ 系统信息</h2>
                <div class="status-grid" id="system-info">
                    <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
                </div>
            </div>
        </div>
        
        <!-- 子代理标签页 -->
        <div id="agents" class="tab-content">
            <div class="card">
                <h2>🤖 子代理列表</h2>
                <table id="agents-table">
                    <thead>
                        <tr>
                            <th>编号</th>
                            <th>名字</th>
                            <th>角色</th>
                            <th>专长</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="4" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 模型标签页 -->
        <div id="models" class="tab-content">
            <div class="card">
                <h2>🧠 可用模型</h2>
                <table id="models-table">
                    <thead>
                        <tr>
                            <th>模型名称</th>
                            <th>类型</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="3" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 域名配置标签页 -->
        <div id="domains" class="tab-content">
            <div class="card">
                <h2>🌐 域名配置</h2>
                <table id="domains-table">
                    <thead>
                        <tr>
                            <th>域名</th>
                            <th>类型</th>
                            <th>状态</th>
                            <th>配置</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="4" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- SSL 证书标签页 -->
        <div id="ssl" class="tab-content">
            <div class="card">
                <h2>🔒 SSL 证书状态</h2>
                <div class="status-grid" id="ssl-status">
                    <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
                </div>
            </div>
        </div>
        
        <!-- 图片集标签页 -->
        <div id="gallery" class="tab-content">
            <div class="card">
                <h2>🖼️ 十一的图片集</h2>
                <div class="gallery" id="gallery-container">
                    <!-- 图片将由 JavaScript 动态加载 -->
                </div>
                <div class="empty-state" id="gallery-empty" style="display: none;">
                    <h2>🎨 还没有图片</h2>
                    <p>让 12（画图子代理）帮你创建一些图片吧！</p>
                </div>
            </div>
        </div>
        
        <footer style="text-align: center; color: rgba(0,0,0,0.5); padding: 1rem; margin-top: 2rem;">
            <p id="last-updated">最后更新：--</p>
        </footer>
        
        <button class="refresh-btn" onclick="loadAllData()" title="刷新">🔄</button>
    </div>
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
