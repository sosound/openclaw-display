groups:
  - name: forum_alerts
    interval: 30s
    rules:
      # Service availability alerts
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.job }}"

      # Database alerts
      - alert: DatabaseConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections high"
          description: "PostgreSQL has {{ $value }} active connections"

      - alert: DatabaseSlowQueries
        expr: rate(pg_stat_statements_seconds_total[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "Average query time is {{ $value }}s"

      # Redis alerts
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      - alert: RedisConnectedClientsHigh
        expr: redis_connected_clients > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis connected clients high"
          description: "Redis has {{ $value }} connected clients"

      # System resource alerts
      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low"
          description: "Disk space is {{ $value }}% available on {{ $labels.instance }}"

      # Nginx alerts
      - alert: NginxHighConnectionRate
        expr: rate(nginx_connections_accepted[5m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Nginx connection rate"
          description: "Nginx is accepting {{ $value }} connections/sec"

      - alert: NginxWorkerConnectionsHigh
        expr: nginx_connections_waiting / nginx_connections_total > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Nginx worker connections high"
          description: "Nginx worker connections at {{ $value | humanizePercentage }}"

      # Backup alerts
      - alert: BackupFailed
        expr: changes(backup_last_success_timestamp[24h]) == 0
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "Database backup failed"
          description: "No successful backup in the last 24 hours"

      # Application specific alerts
      - alert: AppResponseTimeHigh
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Application response time high"
          description: "95th percentile response time is {{ $value }}s"

      - alert: AppRequestRateDrop
        expr: rate(http_requests_total[5m]) < 1
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Application request rate dropped"
          description: "Request rate is {{ $value }} req/s"
