global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'forum-monitor'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scheme: http

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: /metrics
    scheme: http

  # Backend API - Application metrics
  - job_name: 'backend-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: /metrics
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'forum-backend'

  # Nginx metrics
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: /nginx_status
    scheme: http

  # PostgreSQL metrics (requires postgres exporter)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['db:5432']
    metrics_path: /metrics
    scheme: http

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics
    scheme: http

  # Container metrics via cAdvisor (if available)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics
    scheme: http

# Custom recording rules for common queries
recording_rules:
  - record: job:http_requests_total:rate5m
    expr: rate(http_requests_total[5m])

  - record: job:http_request_duration_seconds:avg
    expr: avg(http_request_duration_seconds)

  - record: instance:node_cpu_utilisation:rate5m
    expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)

  - record: instance:node_memory_utilisation:ratio
    expr: 1 - ((node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))
